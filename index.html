<style>

			--bg-grid: #ccc8b1;

		/* MIDNIGHT SKY THEME */
		body.midnight-theme {
			--primary-color: #E8E4F0;

			--bg-grid: #12162a;

		}

			box-shadow: 0 0 30px rgba(123, 104, 238, 0.15), 5px 5px 0 rgba(0, 0, 0, 0.3);
			backdrop-filter: blur(10px);
		}

		body.midnight-theme h1 {

		}

		body.midnight-theme .btn,

		body.midnight-theme .btn:hover,

		body.midnight-theme .answer-button {

		body.midnight-theme .answer-button:hover {

		body.midnight-theme .progress-bar {

		/* GILDED NOIR THEME - Art Nouveau meets Art Deco */

		/* Art Deco corner accents */
		body.gilded-theme .card::before {

			top: -1px;
			left: -1px;

				linear-gradient(225deg, rgba(212, 175, 55, 0.3) 0%, transparent 20%),

		body.gilded-theme .tab {

		body.gilded-theme .tab:hover {

		body.gilded-theme .leaderboard-entry,
		body.gilded-theme .achievement-card {
			background: linear-gradient(145deg, rgba(15, 15, 15, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%);

		/* Art Nouveau decorative container for gilded theme */
		.gilded-ornament {
			position: fixed;
			pointer-events: none;
			z-index: 0;
			display: none;
		}

		body.gilded-theme .gilded-ornament {
			display: block;
		}

		.gilded-ornament.top-left {
			top: 0;
			left: 0;
			width: 200px;
			height: 200px;
			background: 
				radial-gradient(ellipse at top left, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
		}

		.gilded-ornament.bottom-right {
			bottom: 0;
			right: 0;
			width: 250px;
			height: 250px;
			background: 
				radial-gradient(ellipse at bottom right, rgba(212, 175, 55, 0.12) 0%, transparent 60%);
		}

		/* Art Deco sunburst accent */
		.gilded-ornament.sunburst {
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 100vw;
			height: 100vh;
			background: 
				repeating-conic-gradient(
					from 0deg,
					rgba(212, 175, 55, 0.02) 0deg 5deg,
					transparent 5deg 10deg
				);
			opacity: 0.5;
		}

		/* Stars container */
		.stars-container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 0;
			overflow: hidden;
			display: none;
		}

		body.midnight-theme .stars-container {
			display: block;
		}

		.star {
			position: absolute;
			background: #ffffff;
			border-radius: 50%;
			animation: twinkle var(--twinkle-duration, 3s) ease-in-out infinite;
			animation-delay: var(--twinkle-delay, 0s);
		}

		.star.small {
			width: 1px;
			height: 1px;
			box-shadow: 0 0 2px #fff;
		}

		.star.medium {
			width: 2px;
			height: 2px;
			box-shadow: 0 0 4px #fff, 0 0 8px rgba(123, 104, 238, 0.5);
		}

		.star.large {
			width: 3px;
			height: 3px;
			box-shadow: 0 0 6px #fff, 0 0 12px rgba(123, 104, 238, 0.7);
		}

		@keyframes twinkle {
			0%, 100% { opacity: 0.3; transform: scale(1); }
			50% { opacity: 1; transform: scale(1.2); }
		}

		/* Shooting star */
		.shooting-star {
			position: absolute;
			width: 100px;
			height: 2px;
			background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(123,104,238,1) 100%);
			transform: rotate(-45deg);
			animation: shoot 8s ease-in-out infinite;
			opacity: 0;
		}

		@keyframes shoot {
			0% { 
				transform: translateX(0) translateY(0) rotate(-45deg);
				opacity: 0;
			}
			2% { opacity: 1; }
			12% { 
				transform: translateX(400px) translateY(400px) rotate(-45deg);
				opacity: 0;
			}
			100% { opacity: 0; }
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background-color: var(--bg-color);
			background-image: 
			linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
			linear-gradient(var(--bg-grid) 1px, transparent 1px);
			background-size: 0.3rem 0.3rem;
			color: var(--secondary-color);
			font-family: var(--font-family);
			font-weight: 300;
			min-height: 100vh;
			min-height: 100dvh; /* Dynamic viewport height for mobile */
			display: flex;
			flex-direction: column;
			letter-spacing: 0.03rem;
			overflow-x: hidden;
			position: relative;
		}

		/* Prevent pull-to-refresh and overscroll on mobile */
		html {
			overscroll-behavior: none;
		}

		/* Lock scroll during gameplay */
		body.gameplay-active {
			overflow: hidden;
			height: 100vh;
			height: 100dvh;
		}

		body.gameplay-active #app {
			height: 100vh;
			height: 100dvh;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* Background decorative elements */
		.circle {
			position: fixed;
			border: 2px solid rgba(77, 73, 62, 0.15);
			border-radius: 100%;
			pointer-events: none;
			z-index: 0;
		}

		.circle-1 {
			width: 700px;
			height: 700px;
			top: -350px;
			left: -150px;
			animation: float-1 20s ease-in-out infinite;
		}

		.circle-2 {
			width: 675px;
			height: 675px;
			top: -350px;
			left: -150px;
			animation: float-1 20s ease-in-out infinite;
		}

		.circle-3 {
			width: 750px;
			height: 750px;
			bottom: -300px;
			right: -250px;
			animation: float-2 25s ease-in-out infinite;
		}

		.circle-4 {
			width: 725px;
			height: 725px;
			bottom: -300px;
			right: -250px;
			animation: float-2 25s ease-in-out infinite;
		}

		.line {
			position: absolute;
			width: 2px;
			background: rgba(77, 73, 62, 0.75);
			pointer-events: none;
		}

		.line-1 {
			height: 50%;
			top: -25%;
			left: 20%;
			transform: rotate(-35deg);
			animation: slide-diagonal 15s ease-in-out infinite;
		}
		
		.line-2 {
			height: 45%;
			top: -20%;
			left: 15%;
			transform: rotate(-35deg);
			animation: slide-diagonal 15s ease-in-out infinite;
		}
		
		.line-3 {
			height: 55%;
			top: -15%;
			left: 10%;
			transform: rotate(35deg);
			animation: slide-diagonal 20s ease-in-out infinite reverse;
		}
			
		.line-4 {
			height: 60%;
			bottom: -25%;
			right: 20%;
			transform: rotate(-35deg);
			animation: slide-diagonal-reverse 15s ease-in-out infinite;
		}
			
		.line-5 {
			height: 55%;
			bottom: -20%;
			right: 15%;
			transform: rotate(-35deg);
			animation: slide-diagonal-reverse 15s ease-in-out infinite;
		}
			
		.line-6 {
			height: 65%;
			bottom: -15%;
			right: 10%;
			transform: rotate(35deg);
			animation: slide-diagonal-reverse 20s ease-in-out infinite reverse;
		}

		@keyframes float-1 {
			0%, 100% { transform: translate(0, 0); }
			50% { transform: translate(30px, 40px); }
		}

		@keyframes float-2 {
			0%, 100% { transform: translate(0, 0); }
			50% { transform: translate(-40px, 30px); }
		}

		@keyframes slide-diagonal {
			0%, 100% {
			opacity: 0.1;
			transform: rotate(-35deg) translateY(0);
		}
			50% {
			opacity: 0.2;
			transform: rotate(-35deg) translateY(50px);
			}
			}

		@keyframes slide-diagonal-reverse {
			0%, 100% {
			opacity: 0.1;
			transform: rotate(-35deg) translateY(0);
		}
			50% {
			opacity: 0.2;
			transform: rotate(-35deg) translateY(-50px);
			}
			}

			/* Layout */
			#app {
			flex: 1;
			position: relative;
			z-index: 1;
			padding: 2rem 1rem;
			}
	
			.container {
			max-width: 600px;
			margin: 0 auto;
			padding: 0 2rem;
			}

			.game-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 100%;
			}

			.card {
			background: inherited;
			padding: 2.5rem;
			border: 2px solid rgba(77, 73, 62, 0.3);
			width: 100%;
			max-width: 600px;
			margin: 1rem auto;
			box-shadow: 5px 5px 0 rgba(77, 73, 62, 0.2);
			position: relative;
			}

			.large-card: before {
			position: absolute;
			top: 0;
			left: -1.5rem;
			bottom: 0;
			height: 100%;
			width: 0.3rem;
			border: solid #bab5a1;
			border-width: 0 0.2rem 0 0.6rem;
			}

			h1 {
			font-size: 3rem;
			margin-bottom: 0.5rem;
			font-family: 'Kaisei Decol', serif;
			font-weight: 300;
			text-transform: uppercase;
			letter-spacing: 0.5rem;
			text-shadow: 0.3rem 0.3rem 0 rgba(77, 73, 62, 0.3);
			}

			h2 {
			font-size: 2rem;
			margin-bottom: 1.5rem;
			font-family: 'Kaisei Decol', serif;
			font-weight: 300;
			text-transform: uppercase;
			letter-spacing: 0.3rem;
			}
			
			blockquote {
			position: relative;
			padding: 0.5rem;
			}
			blockquote:before {
			content: '';
			position: absolute;
			top: 0;
			left: -1.5rem;
			bottom: 0;
			height: 100%;
			width: 0.3rem;
			border: solid #bab5a1;
			border-width: 0 0.2rem 0 0.6rem;
			}

			.subtitle {
			color: var(--secondary-color);
			font-size: 1rem;
			font-weight: 500;
			}

			/* Button styles */
			.btn, button {
			cursor: pointer;
			font: inherit;
			letter-spacing: 0.05rem;
			border: none;
			padding: 0.8rem 1.5rem;
			background-color: rgba(77, 73, 62, 0.35);
			color: var(--primary-color);
			border: 1px solid transparent;
			border-left: none;
			border-right: none;
			transition-duration: 0.2s;
			transition-property: color, background-color, box-shadow;
			position: relative;
			z-index: 1;
			font-weight: 400;
			}

			.btn::before, button::before {
			content: "";
			position: absolute;
			z-index: -1;
			left: 0;
			top: 3px;
			bottom: 3px;
			width: 0;
			background-color: var(--primary-color);
			transition: width 0.2s;
			}

			.btn:hover, button:hover,
			.btn:focus, button:focus {
			background-color: transparent;
			color: var(--light-text);
			border-color: var(--primary-color);
			}

			.btn:hover::before, button:hover::before,
			.btn:focus::before, button:focus::before {
			width: 100%;
			}

			.btn-group {
			display: flex;
			gap: 1rem;
			width: 100%;
			flex-wrap: wrap;
			}

			.btn-group .btn {
			flex: 1;
			min-width: 140px;
			}


			/* Playing area */
			.playing-area {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 2rem;
			width: 100%;
			}

			.stats-bar {
			display: flex;
			justify-content: space-between;
			width: 100%;
			padding: 1rem;
			background: rgba(77, 73, 62, 0.25);
			border: 2px solid rgba(77, 73, 62, 0.4);
			font-family: 'Orbitron', monospace;
			}

			.stat {
			display: flex;
			flex-direction: column;
			align-items: center;
			}

			.stat-label {
			font-size: 0.75rem;
			opacity: 0.7;
			text-transform: uppercase;
			letter-spacing: 0.1rem;
			}

			.stat-value {
			font-size: 1.5rem;
			font-weight: bold;
			}

			.kana-display {
			font-size: 8rem;
			font-weight: bold;
			text-align: center;
			min-height: 160px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255, 255, 255, 0.4);
			border: 3px solid rgba(77, 73, 62, 0.3);
			padding: 2rem;
			width: 100%;
			color: var(--primary-color);
			font-family: 'Zen Kurenaido', serif;
			box-shadow: 5px 5px 0 rgba(77, 73, 62, 0.2);
			position: relative;
			overflow: hidden;
			}

			/* Multiple Choice Buttons */
			.answer-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 1rem;
			width: 100%;
			}

			.answer-button {
			padding: 1.5rem;
			font-size: 1.25rem;
			background: rgba(255, 255, 255, 0.5);
			border: 2px solid rgba(77, 73, 62, 0.4);
			cursor: pointer;
			transition: all 0.3s ease;
			color: var(--primary-color);
			font-family: var(--font-family);
			font-weight: 600;
			position: relative;
			}

			.answer-button::before {
			content: "";
			position: absolute;
			z-index: -1;
			left: 0;
			top: 3px;
			bottom: 3px;
			width: 0;
			background-color: var(--primary-color);
			transition: width 0.2s;
			}

			.answer-button:hover {
			background-color: transparent;
			color: var(--light-text);
			border-color: var(--primary-color);
			}

			.answer-button:hover::before {
			width: 100%;
			}

			.answer-button.correct {
			background: rgba(139, 168, 106, 0.35);
			border-color: #8BA86A;
			color: #5C7A3D;
			}

			.answer-button.incorrect {
			background: rgba(180, 100, 90, 0.35);
			border-color: #B4645A;
			color: #8B4840;
			}

			.answer-button:disabled {
			cursor: not-allowed;
			opacity: 0.7;
			}

			/* Progress bar */
			.progress-container {
			width: 100%;
			margin: 1rem 0;
			}

			.progress-bar {
			width: 100%;
			height: 8px;
			background: rgba(77, 73, 62, 0.2);
			border: 1px solid rgba(77, 73, 62, 0.3);
			overflow: hidden;
			}

			.progress-fill {
			height: 100%;
			background: var(--primary-color);
			transition: width 0.5s ease;
			}

			.progress-fill.green {
			background: #4caf50;
			}

			/* Game Over styles */
			.game-over-container {
			text-align: center;
			}

			.final-score {
			font-size: 4rem;
			font-weight: bold;
			color: var(--primary-color);
			margin: 1rem 0;
			text-shadow: 3px 3px 0 rgba(77, 73, 62, 0.2);
			}

			.score-details {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 1rem;
			margin: 2rem 0;
			}

			.score-item {
			background: rgba(77, 73, 62, 0.25);
			padding: 1.5rem;
			border: 2px solid rgba(77, 73, 62, 0.3);
			}

			.score-item-label {
			font-size: 0.9rem;
			opacity: 0.7;
			text-transform: uppercase;
			letter-spacing: 0.1rem;
			}

			.score-item-value {
			font-size: 2rem;
			font-weight: bold;
			margin-top: 0.5rem;
			}

			/* Leaderboard */
			.tabs {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.5rem;
			}

			.tab {
			flex: 1;
			padding: 0.75rem;
			background: rgba(77, 73, 62, 0.2);
			border: 2px solid rgba(77, 73, 62, 0.3);
			cursor: pointer;
			transition: all 0.3s ease;
			font-family: var(--font-family);
			font-size: 0.9rem;
			}

			.tab:hover {
			background: rgba(77, 73, 62, 0.3);
			}

			.tab.active {
			background: var(--primary-color);
			color: var(--light-text);
			border-color: var(--primary-color);
			}

			.leaderboard-entry {
			display: flex;
			align-items: center;
			gap: 1rem;
			padding: 1rem;
			background: rgba(255, 255, 255, 0.4);
			border: 2px solid rgba(77, 73, 62, 0.2);
			margin-bottom: 0.75rem;
			}

			.leaderboard-rank {
			font-size: 1.5rem;
			font-weight: bold;
			min-width: 50px;
			text-align: center;
			color: var(--primary-color);
			}

			.leaderboard-rank.gold { color: #b8860b; }
			.leaderboard-rank.silver { color: #708090; }
			.leaderboard-rank.bronze { color: #8b4513; }

			.leaderboard-info {
			flex: 1;
			text-align: left;
			}

			.leaderboard-score {
			font-size: 1.25rem;
			font-weight: bold;
			color: var(--primary-color);
			}

			.leaderboard-details {
			font-size: 0.9rem;
			color: var(--secondary-color);
			margin-top: 0.25rem;
			}

			/* Achievements */
			.achievement-grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 1rem;
			}

			.achievement-card {
			display: flex;
			align-items: center;
			gap: 1rem;
			padding: 1rem;
			background: rgba(255, 255, 255, 0.4);
			border: 2px solid rgba(77, 73, 62, 0.2);
			transition: all 0.3s ease;
			}

			.achievement-card.locked {
			opacity: 0.5;
			filter: grayscale(100%);
			}

			.achievement-card.unlocked {
			background: rgba(76, 175, 80, 0.2);
			border-color: rgba(76, 175, 80, 0.4);
			}

			.achievement-icon {
			font-size: 2.5rem;
			}

			.achievement-info {
			flex: 1;
			text-align: left;
			}

			.achievement-name {
			font-weight: bold;
			font-size: 1.1rem;
			color: var(--primary-color);
			}

			.achievement-desc {
			font-size: 0.9rem;
			color: var(--secondary-color);
			margin-top: 0.25rem;
			}

			.achievement-status {
			font-size: 0.8rem;
			color: #4caf50;
			font-weight: 600;
			margin-top: 0.25rem;
			}

			/* Utility classes */
			.text-center { text-align: center; }
			.text-gray { color: var(--secondary-color); }
			.text-xs { font-size: 0.75rem; }
			.mb-3 { margin-bottom: 1.5rem; }
			.mt-4 { margin-top: 2rem; }

			.overflow-auto {
			overflow-y: auto;
			max-height: 500px;
			}
			<!--FALLING KANA ANIMATION (for Multiple Choice)-->
			.kana-character {
				position: absolute;
				top: 0;
				left: 50%;
				transform: translateX(-50%);
				font-size: 9rem;
				font-weight: 700;
			}

			.kana-character.random-font { 
				transition: font-family 0.3s ease-in-out; 
			}

			.kana-text {
				font-weight: 700;
			}

			@keyframes fall {
				from {
					transform: translateX(-50%) translateY(-100%);
				}
				to {
					transform: translateX(-50%) translateY(400px);
				}
			}

			.kana-character.falling {
				animation: fall linear forwards;
			}

			.ground-line {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 4px;
				background: #B4645A;
			}

			.feedback {
				position: absolute;
				bottom: 2rem;
				left: 50%;
				transform: translateX(-50%);
				font-size: 1.5rem;
				font-weight: 700;
				white-space: nowrap;
			}

			.feedback.correct {
				color: #5C7A3D;
			}

			.feedback.incorrect {
				color: #8B4840;
			}

			@keyframes fadeIn {
			from {
			opacity: 0;
			transform: translateY(-20px);
			}
			to {
			opacity: 1;
			transform: translateY(0);
			}
			}

			.card {
			animation: fadeIn 0.5s ease-out;
			}

			@keyframes correctShake {
			0%, 100% { transform: translateX(0); }
			25% { transform: translateX(-5px) rotate(-2deg); }
			75% { transform: translateX(5px) rotate(2deg); }
			}

			.kana-display.correct {
			animation: correctShake 0.4s ease;
			}

			@keyframes incorrectShake {
			0%, 100% { transform: translateX(0); }
			10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
			20%, 40%, 60%, 80% { transform: translateX(10px); }
			}

			.kana-display.incorrect {
			animation: incorrectShake 0.5s ease;
			}


			.kana-drop {
			position: absolute;
			top: -100px;
			font-size: 3rem;
			font-weight: bold;
			color: var(--primary-color);
			opacity: 0;
			animation: kanaDrop 2s ease-out forwards;
			pointer-events: none;
			font-family: 'Zen Kurenaido', serif;
			}

			@keyframes kanaDrop {
			0% {
			top: -100px;
			opacity: 1;
			transform: rotate(0deg);
			}
			70% {
			opacity: 1;
			}
			100% {
			top: calc(100% + 50px);
			opacity: 0;
			transform: rotate(360deg);
			}
			}

			/* New record badge */
			.new-record-badge {
			display: inline-block;
			background: var(--primary-color);
			color: var(--light-text);
			padding: 0.5rem 1.5rem;
			border: 2px solid var(--primary-color);
			font-weight: bold;
			font-size: 1.25rem;
			margin: 1rem 0;
			box-shadow: 3px 3px 0 rgba(77, 73, 62, 0.3);
			}

			/* Confetti canvas */
			#confetti-canvas {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 9999;
			}

			/* Section selector */
			.section-selector {
			margin: 1.5rem 0;
			padding: 1.5rem;
			background: rgba(255, 255, 255, 0.3);
			border: 2px solid rgba(77, 73, 62, 0.3);
			}

			.section-option, .time-limit-select {
			width: 100%;
			padding: 0.75rem;
			border: 2px solid rgba(77, 73, 62, 0.3);
			background: rgba(255, 255, 255, 0.5);
			font-family: var(--font-family);
			font-size: 1rem;
			color: var(--primary-color);
			margin-bottom: 0.5rem;
			}

			.time-limit-label {
			display: block;
			margin-bottom: 0.5rem;
			font-weight: 600;
			color: var(--primary-color);
			text-transform: uppercase;
			letter-spacing: 0.1rem;
			font-size: 0.9rem;
			}

			.section-start-btn {
			width: 100%;
			margin-top: 1rem;
			}

			/* Settings styles */
			.settings-group {
			display: flex;
			flex-direction: column;
			gap: 1.5rem;
			margin: 2rem 0;
			}

			.setting-item {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			}

			.setting-label {
			font-weight: 600;
			font-size: 1.1rem;
			color: var(--primary-color);
			}

			.setting-select {
			width: 100%;
			padding: 1rem;
			border: 2px solid rgba(77, 73, 62, 0.3);
			background: rgba(255, 255, 255, 0.5);
			font-family: var(--font-family);
			font-size: 1rem;
			color: var(--primary-color);
			cursor: pointer;
			transition: all 0.3s ease;
			}

			.setting-select:hover {
			border-color: var(--primary-color);
			}

			.setting-select:focus {
			outline: none;
			border-color: var(--primary-color);
			box-shadow: 3px 3px 0 rgba(77, 73, 62, 0.2);
			}

			/* Responsive design */
			@media (max-width: 768px) {
			h1 { font-size: 2rem; letter-spacing: 0.3rem; }
			h2 { font-size: 1.5rem; }
			.card { padding: 1.5rem; }
			.container { padding: 0 1rem; }
			.kana-display { font-size: 5rem; min-height: 120px; }
			.answer-grid { grid-template-columns: 1fr; }
			.btn-group { flex-direction: column; }
			.score-details { grid-template-columns: 1fr; }
			}

			/* Small mobile screens (iPhone SE, small Android) */
			@media (max-width: 400px) {
			#app {
				padding: 0.5rem;
			}

			.card {

		function playSound(type) {
			if (!state.audioEnabled) return;
			
			const audioContext = new (window.AudioContext || window.webkitAudioContext)();
			const oscillator = audioContext.createOscillator();
			const gainNode = audioContext.createGain();
			
			oscillator.connect(gainNode);
			gainNode.connect(audioContext.destination);
			
			if (type === 'correct') {
				oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
				oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
				oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
				gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
				gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
				oscillator.start(audioContext.currentTime);
				oscillator.stop(audioContext.currentTime + 0.3);
			} else if (type === 'incorrect') {
				oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
				oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
				gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
				gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
				oscillator.start(audioContext.currentTime);
				oscillator.stop(audioContext.currentTime + 0.2);
			} else if (type === 'achievement') {
				oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
				oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.15);
				oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.3);

				oscillator.start(audioContext.currentTime);

		function createStars() {
			const container = document.getElementById('starsContainer');
			if (!container) return;
			
			container.innerHTML = '';
			
			// Create random stars
			const starCount = 150;
			for (let i = 0; i < starCount; i++) {
				const star = document.createElement('div');
				star.className = 'star';
				
				// Random size class
				const sizeRand = Math.random();
				if (sizeRand < 0.6) star.classList.add('small');
				else if (sizeRand < 0.9) star.classList.add('medium');
				else star.classList.add('large');
				
				// Random position
				star.style.left = Math.random() * 100 + '%';
				star.style.top = Math.random() * 100 + '%';
				
				// Random twinkle timing
				star.style.setProperty('--twinkle-duration', (2 + Math.random() * 4) + 's');
				star.style.setProperty('--twinkle-delay', (Math.random() * 5) + 's');
				
				container.appendChild(star);
			}
			
			// Create shooting stars
			for (let i = 0; i < 3; i++) {
				const shootingStar = document.createElement('div');
				shootingStar.className = 'shooting-star';
				shootingStar.style.left = (10 + Math.random() * 40) + '%';
				shootingStar.style.top = (5 + Math.random() * 30) + '%';
				shootingStar.style.animationDelay = (i * 4 + Math.random() * 2) + 's';
				container.appendChild(shootingStar);
			}
		}

		// ===== GAME LOGIC =====
		function getKanaSet() {
			// Comprehensive challenge mode - combine both scripts
			if (state.kanaType === 'comprehensive') {
				const allHiragana = Object.values(HIRAGANA).flat();
				const allKatakana = Object.values(KATAKANA).flat();
				return [...allHiragana, ...allKatakana];
			}
			
			const kanaData = state.kanaType === 'hiragana' ? HIRAGANA : KATAKANA;
			
			if (state.kanaSection === 'vowels') {
				return kanaData.vowels;
			}
			
			if (state.difficulty === 'easy') {
				return kanaData[state.kanaSection] || kanaData.vowels;
			} else if (state.difficulty === 'medium') {
				return Object.values(kanaData).flat();
			} else {
				return Object.values(kanaData).flat();
			}
		}

		function generateQuestion() {
			const kanaSet = getKanaSet();
			const correctChar = kanaSet[Math.floor(Math.random() * kanaSet.length)];
			
			state.currentChar = correctChar.char;
			state.correctAnswer = correctChar.romaji;
			
			// Random font assignment for falling kana
			const kanaFonts = [
				"'Yomogi', cursive",
				"'Kosugi Maru', sans-serif",
				"'Kaisei Tokumin', serif",

				"'Yuji Boku', serif",
				"'Reggae One', sans-serif",
				"'Train One', sans-serif",
				"'Hina Mincho', serif"
			];
			state.randomFont = kanaFonts[Math.floor(Math.random() * kanaFonts.length)];
			state.timeLeft = DIFFICULTY[state.difficulty].time;
			
			const wrongOptions = kanaSet
				.filter(k => k.romaji !== correctChar.romaji)
				.sort(() => Math.random() - 0.5)
				.slice(0, 3)
				.map(k => k.romaji);
			
			state.options = [correctChar.romaji, ...wrongOptions]
				.sort(() => Math.random() - 0.5);
		}

		function startGame() {
			// Add gameplay-active class to prevent scrolling on mobile
			document.body.classList.add('gameplay-active');
			
			state.gameState = 'playing';

			if (state.sectionTimeLimit) {

				state.timerInterval = setInterval(updateTimer, 1000);
			} else {
				state.timeRemaining = null;
				if (state.timerInterval) {

			generateQuestion();

			if (timerInterval) clearInterval(timerInterval);
			timerInterval = setInterval(() => {
				state.timeLeft -= 0.01;
				if (state.sectionTimeLimit && state.timeRemaining !== null) {
					// Section timer is handled separately
				}
				if (state.timeLeft <= 0) {
					state.timeLeft = 0;
					handleTimeout();
				}
				updateGameTimer();
			}, 10);
			
			render();
		}

		function updateTimer() {
			if (state.timeRemaining !== null) {
				state.timeRemaining--;
				
				const timerEl = document.getElementById('timer');
				if (timerEl) {
					timerEl.textContent = state.timeRemaining;
				}
				
				if (state.timeRemaining <= 0) {

		}

		function updateGameTimer() {
			const timerBar = document.getElementById('timer-bar');
			const timerText = document.getElementById('timer-text');
			
			if (timerBar && timerText) {
				const maxTime = DIFFICULTY[state.difficulty].time;
				const percentage = (state.timeLeft / maxTime) * 100;
				timerBar.style.width = percentage + '%';
				timerText.textContent = state.timeLeft.toFixed(2) + 's';
			}
		}

		function handleTimeout() {
			if (timerInterval) {
				clearInterval(timerInterval);
				timerInterval = null;
			}
			
			state.incorrectCount++;
			state.streak = 0;
			
			const feedback = document.getElementById('feedback');
			if (feedback) {
				feedback.textContent = '⏰ Time Up!';
				feedback.className = 'feedback incorrect';
			}
			
			playSound('incorrect');
			
			setTimeout(() => {
				if (state.difficulty === 'hard') {
					endGame();
				} else {
					state.roundsPlayed++;
					generateQuestion();
					render();
					
					// Restart timer
					if (timerInterval) clearInterval(timerInterval);
					timerInterval = setInterval(() => {
						state.timeLeft -= 0.01;
						if (state.timeLeft <= 0) {
							state.timeLeft = 0;
							handleTimeout();
						}
						updateGameTimer();
					}, 10);
				}
			}, 1500);
		}

		function updateTimer() {
			if (state.timeRemaining !== null) {
				state.timeRemaining--;
				
				const timerEl = document.getElementById('timer');
				if (timerEl) {
					timerEl.textContent = state.timeRemaining;
				}
				
				if (state.timeRemaining <= 0) {
					endGame();
				}
			}
		}

		function checkAnswer(selectedAnswer) {
			if (timerInterval) {
				clearInterval(timerInterval);
				timerInterval = null;
			}
			
			const roundTime = (Date.now() - state.roundStartTime) / 1000;
			state.totalTime += roundTime;
			
			const isCorrect = selectedAnswer === state.correctAnswer;
			
			const buttons = document.querySelectorAll('.answer-button');
			buttons.forEach(btn => {
				btn.disabled = true;
				if (btn.dataset.answer === state.correctAnswer) {
					btn.classList.add('correct');
				} else if (btn.dataset.answer === selectedAnswer && !isCorrect) {
					btn.classList.add('incorrect');
				}
			});
			
			const kanaDisplay = document.querySelector('.kana-display');
			const feedback = document.getElementById('feedback');
			
			if (isCorrect) {
				state.score += Math.max(10, Math.floor(20 - roundTime));
				state.correctCount++;
				state.streak++;
				if (state.streak > state.bestStreak) {
					state.bestStreak = state.streak;
				}
				
				kanaDisplay.classList.add('correct');
				if (feedback) {
					feedback.textContent = '✓ Correct!';
					feedback.className = 'feedback correct';
				}
				playSound('correct');
				
				checkAchievements();
				
				setTimeout(() => {
					state.roundsPlayed++;
					
					if (state.difficulty === 'hard' && state.roundsPlayed >= 20) {
						endGame();
					} else if (state.difficulty === 'medium' && state.roundsPlayed >= 30) {
						endGame();
					} else if (state.difficulty === 'easy' && state.roundsPlayed >= 40) {
						endGame();
					} else {
						generateQuestion();
						render();
						
						// Restart timer
						if (timerInterval) clearInterval(timerInterval);
						timerInterval = setInterval(() => {
							state.timeLeft -= 0.01;
							if (state.timeLeft <= 0) {
								state.timeLeft = 0;
								handleTimeout();
							}
							updateGameTimer();
						}, 10);
					}
				}, 1000);
			} else {
				state.incorrectCount++;
				state.streak = 0;
				
				kanaDisplay.classList.add('incorrect');
				if (feedback) {
					feedback.textContent = '✗ Wrong! (' + state.correctAnswer + ')';
					feedback.className = 'feedback incorrect';
				}
				playSound('incorrect');
				
				setTimeout(() => {
					if (state.difficulty === 'hard') {
						endGame();
					} else {
						state.roundsPlayed++;
						generateQuestion();
						render();
						
						// Restart timer
						if (timerInterval) clearInterval(timerInterval);
						timerInterval = setInterval(() => {
							state.timeLeft -= 0.01;
							if (state.timeLeft <= 0) {
								state.timeLeft = 0;
								handleTimeout();
							}
							updateGameTimer();
						}, 10);
					}
				}, 1000);
			}
		}

		function endGame() {
			// Remove gameplay-active class to restore scrolling
			document.body.classList.remove('gameplay-active');
			
			if (timerInterval) {
				clearInterval(timerInterval);
				timerInterval = null;
			}
			if (state.timerInterval) {
				clearInterval(state.timerInterval);
				state.timerInterval = null;
			}
			
			state.totalRoundsPlayed++;
			if (state.kanaType === 'hiragana') {
				state.hiraganaRoundsPlayed++;
				state.hasPlayedHiragana = true;
			} else {
				state.katakanaRoundsPlayed++;
				state.hasPlayedKatakana = true;
			}
			
			if (state.difficulty === 'hard') {
				state.hardModeRounds++;
			}
			
			checkAchievements();
			saveAchievementData();
			
			saveScore();
			state.gameState = 'gameover';
			render();
		}

		// ===== ACHIEVEMENTS =====
		function checkAchievements() {
			const unlocked = [];
			
			if (state.roundsPlayed >= 1 && !state.unlockedAchievements.includes('first_steps')) {
				unlocked.push('first_steps');
			}
			if (state.totalRoundsPlayed >= 10 && !state.unlockedAchievements.includes('dedication')) {
				unlocked.push('dedication');
			}
			if (state.totalRoundsPlayed >= 50 && !state.unlockedAchievements.includes('veteran')) {
				unlocked.push('veteran');
			}
			if (state.totalRoundsPlayed >= 100 && !state.unlockedAchievements.includes('master')) {
				unlocked.push('master');
			}
			
			if (state.streak >= 5 && !state.unlockedAchievements.includes('streak_5')) {
				unlocked.push('streak_5');
			}
			if (state.streak >= 10 && !state.unlockedAchievements.includes('streak_10')) {
				unlocked.push('streak_10');
			}
			if (state.streak >= 20 && !state.unlockedAchievements.includes('streak_20')) {
				unlocked.push('streak_20');
			}
			
			if (state.hiraganaRoundsPlayed >= 10 && !state.unlockedAchievements.includes('hiragana_hero')) {
				unlocked.push('hiragana_hero');
			}
			if (state.katakanaRoundsPlayed >= 10 && !state.unlockedAchievements.includes('katakana_king')) {
				unlocked.push('katakana_king');
			}
			if (state.hasPlayedHiragana && state.hasPlayedKatakana && !state.unlockedAchievements.includes('both_scripts')) {
				unlocked.push('both_scripts');
			}
			
			if (state.hardModeRounds >= 5 && !state.unlockedAchievements.includes('hard_mode')) {
				unlocked.push('hard_mode');
			}
			
			const avgTime = state.roundsPlayed > 0 ? state.totalTime / state.roundsPlayed : 0;
			if (avgTime < 2 && state.roundsPlayed >= 10 && !state.unlockedAchievements.includes('speed_demon')) {
				unlocked.push('speed_demon');
			}
			
			unlocked.forEach(id => {
				if (!state.unlockedAchievements.includes(id)) {
					state.unlockedAchievements.push(id);
					showAchievementNotification(ACHIEVEMENTS[id]);
				}
			});
		}

		// ===== LEADERBOARD =====
		function saveScore() {
			const avgTime = state.roundsPlayed > 0 ? (state.totalTime / state.roundsPlayed).toFixed(2) : '0.00';
			
			// Determine kana type display name
			let kanaTypeDisplay;
			if (state.kanaType === 'comprehensive') {
				kanaTypeDisplay = 'Comprehensive (All)';
			} else if (state.kanaType === 'hiragana') {
				kanaTypeDisplay = 'Hiragana';
			} else {
				kanaTypeDisplay = 'Katakana';
			}
			
			const entry = {
				score: state.score,
				rounds: state.roundsPlayed,
				streak: state.bestStreak,
				avgTime: avgTime,
				kanaType: kanaTypeDisplay,
				difficulty: state.difficulty.charAt(0).toUpperCase() + state.difficulty.slice(1),
				date: new Date().toLocaleDateString()
			};
			
			let leaderboard = JSON.parse(localStorage.getItem('kanaBlitzLeaderboard') || '[]');
			
			const isNewRecord = leaderboard.length === 0 || entry.score > leaderboard[0].score;
			state.isNewRecord = isNewRecord;
			
			leaderboard.push(entry);
			leaderboard.sort((a, b) => b.score - a.score);
			leaderboard = leaderboard.slice(0, 10);
			
			localStorage.setItem('kanaBlitzLeaderboard', JSON.stringify(leaderboard));
		}

		// ===== CONFETTI =====
		function launchConfetti() {
			const canvas = document.getElementById('confetti-canvas');
			const ctx = canvas.getContext('2d');
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
			
			const confetti = [];
			const confettiCount = 150;
			const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#eb4d4b', '#6c5ce7'];
			
			for (let i = 0; i < confettiCount; i++) {
				confetti.push({
					x: Math.random() * canvas.width,
					y: Math.random() * canvas.height - canvas.height,
					size: Math.random() * 8 + 4,
					speedY: Math.random() * 3 + 2,
					speedX: Math.random() * 2 - 1,
					color: colors[Math.floor(Math.random() * colors.length)],
					rotation: Math.random() * 360,
					rotationSpeed: Math.random() * 10 - 5
				});
			}
			
			function drawConfetti() {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				
				confetti.forEach((p, index) => {
					ctx.save();
					ctx.translate(p.x, p.y);
					ctx.rotate((p.rotation * Math.PI) / 180);
					ctx.fillStyle = p.color;
					ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
					ctx.restore();
					
					p.y += p.speedY;
					p.x += p.speedX;
					p.rotation += p.rotationSpeed;
					
					if (p.y > canvas.height) {
						confetti.splice(index, 1);
					}
				});
				
				if (confetti.length > 0) {
					requestAnimationFrame(drawConfetti);
				} else {
					ctx.clearRect(0, 0, canvas.width, canvas.height);
				}
			}
			
			drawConfetti();
		}

		// ===== NUMBER ANIMATION =====
		function animateNumber(element, target, duration) {
			const start = 0;
			const increment = target / (duration / 16);
			let current = start;
			
			const timer = setInterval(() => {
				current += increment;
				if (current >= target) {
					current = target;
					clearInterval(timer);
				}
				element.textContent = Math.floor(current);
			}, 16);
		}

							<div class="stat">
								<div class="stat-label">SCORE</div>
								<div class="stat-value">${state.score}</div>
							</div>
							<div class="stat">
								<div class="stat-label">STREAK</div>
								<div class="stat-value">${state.streak}</div>
							</div>
							<div class="stat">
								<div class="stat-label">ROUND</div>
								<div class="stat-value">${state.roundsPlayed}/${maxRounds}</div>
							</div>
							${state.timeRemaining !== null ? `
								<div class="stat">
									<div class="stat-label">TIME</div>
									<div class="stat-value" id="timer">${state.timeRemaining}</div>
								</div>
							` : ''}
						</div>
						
						<div class="progress-container">
							<div class="progress-bar">
								<div class="progress-fill" style="width: ${progress}%"></div>
							</div>
						</div>
						
						<div class="progress-container">
							<div class="progress-bar" id="timer-bar-container">
								<div id="timer-bar" class="progress-fill green" style="width: 100%"></div>
							</div>
						</div>
						<div id="timer-text" class="text-center" style="margin-bottom: 1rem; font-weight: bold;">${state.timeLeft.toFixed(2)}s</div>
						
						<div class="playing-area">
							<div class="kana-display">
								<div class="kana-character kana-text falling random-font" 
									 style="font-family: ${state.randomFont}; animation-duration: ${animationDuration}s; animation-play-state: ${state.timeLeft > 0 ? 'running' : 'paused'}">
									${kanaChar}
								</div>
								<div class="ground-line"></div>
								<div id="feedback" class="feedback"></div>
							</div>
							
							<div class="answer-grid">
								${state.options.map(option => `
									<button class="answer-button" 
											data-answer="${option}"
											onclick="checkAnswer('${option}')">
										${option}
									</button>
								`).join('')}
							</div>
						</div>
					</div>
				</div>
			`;
		}

		function renderGameOver() {
			const avgTime = state.roundsPlayed > 0 ? (state.totalTime / state.roundsPlayed).toFixed(2) : '0.00';
			
			const template = `
				<div class="game-container">
					<div class="card large-card game-over-container">
						<h2 class="gradient-text">試合終了！<br>「Shiai Shūryō!」<br><small>Game Over</small></h2>
						
						${state.isNewRecord ? `
							<div class="new-record-badge">
								🏆 NEW RECORD! 🏆
							</div>
						` : ''}
						
						<div class="final-score" id="finalScore">${state.score}</div>
						
						<div class="score-details">
							<div class="score-item">
								<div class="score-item-label">Correct</div>
								<div class="score-item-value" id="correctCount">${state.correctCount}</div>
							</div>
							<div class="score-item">
								<div class="score-item-label">Best Streak</div>
								<div class="score-item-value" id="bestStreak">${state.bestStreak}</div>
							</div>
							<div class="score-item">
								<div class="score-item-label">Total Rounds</div>
								<div class="score-item-value" id="totalRounds">${state.roundsPlayed}</div>
							</div>
							<div class="score-item">
								<div class="score-item-label">Avg Time</div>
								<div class="score-item-value" id="avgTime">${avgTime}s</div>
							</div>
						</div>
						
						<div class="btn-group">
							<button class="btn btn-primary" onclick="showGameMode()">Play Again – もう一度</button>
							<button class="btn btn-secondary" onclick="showStats()">Leaderboard – ブリボード</button>
							<button class="btn btn-gray" onclick="backToMenu()">Menu – メニュー</button>
						</div>
					</div>
				</div>
			`;
			
			setTimeout(() => {
			  const s = document.getElementById('finalScore');
			  const c = document.getElementById('correctCount');
			  const st = document.getElementById('bestStreak');
			  const r = document.getElementById('totalRounds');
			  const a = document.getElementById('avgTime');
			  if(s) animateNumber(s, state.score, 1000);
			  if(st) animateNumber(st, state.bestStreak, 900);
			  if(r) animateNumber(r, state.roundsPlayed, 900);
			  if(a) animateNumber(a, Number((state.roundsPlayed>0?(state.totalTime/state.roundsPlayed):0).toFixed(2))*100, 900);
			  setTimeout(()=>{ if(a) a.textContent = (state.roundsPlayed>0?(state.totalTime/state.roundsPlayed):0).toFixed(2); }, 950);
			  if(state.isNewRecord) launchConfetti();
			}, 0);
			return template;
		}

		function renderStats() {
			const leaderboard = getLeaderboard();
			
		return `
				<div class="game-container">
					<div class="card large-card">
						<h2 class="gradient-text">
							ブリログ<br>
							「Brilliance Log」
						</h2>
						
						<div class="tabs">
							<button class="tab ${state.statsTab === 'leaderboard' ? 'active' : ''}" 
									onclick="switchStatsTab('leaderboard')">
								ブリボード<br>
								「Buribōdo」<br>
								<small>Leaderboard</small>
							</button>
							<button class="tab ${state.statsTab === 'achievements' ? 'active' : ''}" 
									onclick="switchStatsTab('achievements')">
								達成ブリ！<br>
								「Tassei Buri!」<br>
								<small>Achievements</small>
								(${state.unlockedAchievements.length}/${Object.keys(ACHIEVEMENTS).length})
							</button>
						</div>
						
						${state.statsTab === 'leaderboard' ? `
							<div class="overflow-auto">
								${leaderboard.length === 0 ? `
									<p class="text-center text-gray" style="padding: 3rem 0;">
										No scores yet. Play a game!
									</p>
								` : leaderboard.map((entry, index) => `
									<div class="leaderboard-entry">
										<div class="leaderboard-rank ${index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : ''}">
											#${index + 1}
										</div>
										<div class="leaderboard-info">
											<div class="leaderboard-score">${entry.score} pts</div>
											<div class="leaderboard-details">
												${entry.rounds} rounds • Streak: ${entry.streak} • Avg: ${entry.avgTime}s
											</div>
											<div class="text-xs text-gray">
												${entry.kanaType} • ${entry.difficulty} • ${entry.date}
											</div>
										</div>
									</div>
								`).join('')} </div>
						` : `
							<p class="text-center text-gray mb-3">
								${state.unlockedAchievements.length} of ${Object.keys(ACHIEVEMENTS).length} unlocked
							</p>
							
							<div class="progress-bar mb-3">
								<div class="progress-fill green" 
									 style="width: ${(state.unlockedAchievements.length / Object.keys(ACHIEVEMENTS).length) * 100}%">
								</div>
							</div>
							
							<div class="overflow-auto">
								<div class="achievement-grid">
									${Object.values(ACHIEVEMENTS).map(achievement => {
										const isUnlocked = state.unlockedAchievements.includes(achievement.id);
										return `
											<div class="achievement-card ${isUnlocked ? 'unlocked' : 'locked'}">
												<div class="achievement-icon">${achievement.icon}</div>
												<div class="achievement-info">
													<div class="achievement-name">${achievement.name}</div>
													<div class="achievement-desc">${achievement.desc}</div>
													${isUnlocked ? '<div class="achievement-status">✓ Unlocked</div>' : ''}
												</div>
											</div>
										`;
									}).join('')} </div>
							</div>
						`}
						
						<div class="btn-group mt-4">
							<button class="btn btn-gray" onclick="backToMenu()">Return – もどる</button>
							${state.statsTab === 'leaderboard' ? '<button class="btn btn-secondary" onclick="clearLeaderboard()">Clear Data</button>' : ''}
						</div>
					</div>
				</div>
			`;
		}





		function render() {
			const app = document.getElementById('app');
			
			let html = '';
			switch (state.gameState) {
				case 'menu':
					html = renderMenu();
					break;
				case 'gameMode':                    html = renderGameMode();                    break;
				case 'playing':
					html = renderPlaying();
					break;
				case 'gameover':
					html = renderGameOver();
					break;
				case 'stats':
					html = renderStats();
					break;
				case 'settings':
					html = renderSettings();
					break;
			}
			
			app.innerHTML = html;
		}

		<!--EVENT HANDLERS (attached to window for onclick)-->
		window.setKanaAndDifficulty = (kanaType, difficulty) => {
			state.kanaType = kanaType;
			state.difficulty = difficulty;
			state.kanaSection = 'vowels';  <!--Reset to default-->
			startGame();
		};

		window.setKanaAndDifficultyWithSection = (kanaType, difficulty, section) => {
			state.kanaType = kanaType;
			state.difficulty = difficulty;
			state.kanaSection = section;
			startGame();
		};

		window.startSectionWithTimeLimit = (kanaType) => {
		const sectionSelect = document.getElementById(kanaType + 'Section');
		const timeLimitSelect = document.getElementById(kanaType + 'TimeLimit');
		const section = sectionSelect.value;
		const timeLimit = timeLimitSelect.value;

		<!--Handle zenBuri! dropdown options-->
		if (section === 'all_hiragana') {
		state.kanaType = 'hiragana';
		state.difficulty = 'medium';
		state.kanaSection = 'vowels';
		state.sectionTimeLimit = null;
		startGame();
		return;
		}
		if (section === 'all_katakana') {
		state.kanaType = 'katakana';
		state.difficulty = 'medium';
		state.kanaSection = 'vowels';
		state.sectionTimeLimit = null;
		startGame();
		return;
		}

		state.kanaType = kanaType;
		state.difficulty = 'easy';
		state.kanaSection = section;
		state.sectionTimeLimit = timeLimit === 'unlimited' ? null : parseInt(timeLimit);
		startGame();
		};



		// ===== COMPREHENSIVE CHALLENGE =====
		window.startComprehensiveChallenge = () => {
			state.kanaType = 'comprehensive';
			state.difficulty = 'hard';
			state.kanaSection = 'all';
			state.sectionTimeLimit = null;
			startGame();
		};

		window.showGameMode = () => {            state.gameState = 'gameMode';            render();        };

		window.backToMenu = () => {
			state.gameState = 'menu';
			render();
		};

		window.setKanaType = (type) => {
			state.kanaType = type;
			render();
		};

		window.setDifficulty = (diff) => {
			state.difficulty = diff;
			render();
		};

		window.showStats = () => {
			state.gameState = 'stats';
			render();
		};

		window.showSettings = () => {
			state.gameState = 'settings';
			render();
		};

		window.changeTheme = (theme) => {
			// Remove all theme classes first
			document.body.classList.remove('midnight-theme', 'gilded-theme');
			
			if (theme === 'midnight') {
				document.body.classList.add('midnight-theme');
				createStars();
			} else if (theme === 'gilded') {
				document.body.classList.add('gilded-theme');
			}
			// geometric is the default, no class needed
			
			localStorage.setItem('kanaBlitzTheme', theme);
		};

		window.changeAudio = (value) => {
			state.audioEnabled = value === 'on';
			localStorage.setItem('kanaBlitzAudio', state.audioEnabled);
		};

		window.switchStatsTab = (tab) => {
			state.statsTab = tab;
			render();
		};




		window.clearLeaderboard = () => {
			if (confirm('Clear all leaderboard data and achievements?')) {
				localStorage.removeItem('kanaBlitzLeaderboard');
				localStorage.removeItem('kanaBlitzAchievements');
				state.unlockedAchievements = [];
				state.totalRoundsPlayed = 0;
				state.hiraganaRoundsPlayed = 0;
				state.katakanaRoundsPlayed = 0;
				state.hardModeRounds = 0;
				state.hasPlayedHiragana = false;
				state.hasPlayedKatakana = false;
				render();
			}
		};



		<!--Initialize-->
		loadAchievementData();
		loadAudioPreference();
		loadThemePreference();
		render();
	</script>
</body>
</html>
